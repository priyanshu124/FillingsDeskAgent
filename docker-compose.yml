services:
  db:
    image: pgvector/pgvector:pg17
    container_name: peerdesk-db
    environment:
      POSTGRES_USER: peerdesk
      POSTGRES_PASSWORD: peerdesk_local_pw
      POSTGRES_DB: peerdesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peerdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: peerdesk-app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_URL=postgresql://peerdesk:peerdesk_local_pw@db:5432/peerdesk
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
